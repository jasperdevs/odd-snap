name: Rust rewrite

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "docs/macos-readiness.md"
      - "docs/rust-packaging-readiness.md"
      - "docs/rust-rewrite-parity.md"
      - "docs/rust-rewrite-todo.md"
      - "packaging/macos/**"
      - "scripts/linux/**"
      - "scripts/macos/**"
      - "scripts/windows/**"
      - ".github/workflows/rust-rewrite.yml"
  push:
    branches:
      - codex/rust-gpui-rewrite-20260506

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows latest x64
            os: windows-latest
          - name: macOS latest Apple Silicon
            os: macos-26
          - name: macOS Intel compatibility
            os: macos-26-intel
          - name: Ubuntu latest x64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            gnome-screenshot \
            grim \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libxdo-dev \
            scrot \
            slop \
            slurp \
            wl-clipboard \
            x11-xserver-utils \
            xclip \
            xdotool \
            xsel
      - name: Check Linux runtime command coverage
        if: runner.os == 'Linux'
        run: |
          command -v ffmpeg
          command -v curl
          command -v gnome-screenshot
          command -v grim
          command -v scrot
          command -v slop
          command -v slurp
          command -v wl-copy
          command -v xclip
          command -v xdotool
          command -v xrandr
          command -v xsel
      - name: Check upload command coverage
        run: curl --version
      - name: Validate macOS package metadata
        if: runner.os == 'macOS'
        run: plutil -lint packaging/macos/Info.plist packaging/macos/OddSnap.entitlements
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build app
        run: cargo build -p oddsnap-app --bin oddsnap-rust
      - name: Package local Windows app folder
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/windows/package-oddsnap-rust.ps1 -Profile debug -SkipBuild -Output dist/windows-ci
      - name: Package local Linux AppDir
        if: runner.os == 'Linux'
        run: scripts/linux/package-oddsnap-rust.sh --profile debug --skip-build --output dist/linux-ci
      - name: Package unsigned macOS app bundle
        if: runner.os == 'macOS'
        run: scripts/macos/package-oddsnap-rust.sh --profile debug --skip-build --unsigned --output dist/macos-ci
