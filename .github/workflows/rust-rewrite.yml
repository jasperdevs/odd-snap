name: Rust rewrite

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "docs/macos-readiness.md"
      - "docs/rust-packaging-readiness.md"
      - "docs/rust-rewrite-parity.md"
      - "docs/rust-rewrite-todo.md"
      - "packaging/macos/**"
      - "scripts/macos/**"
      - ".github/workflows/rust-rewrite.yml"
  push:
    branches:
      - codex/rust-gpui-rewrite-20260506

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev
      - name: Validate macOS package metadata
        if: runner.os == 'macOS'
        run: plutil -lint packaging/macos/Info.plist packaging/macos/OddSnap.entitlements
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build app
        run: cargo build -p oddsnap-app --bin oddsnap-rust
