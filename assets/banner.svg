<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f0f0f"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00b4d8"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="199" rx="15.5" stroke="white" stroke-opacity="0.06"/>
  
  <!-- Selection rectangle mockup -->
  <rect x="540" y="45" width="180" height="110" rx="4" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8 5" fill="white" fill-opacity="0.03"/>
  <circle cx="540" cy="45" r="3" fill="white" fill-opacity="0.8"/>
  <circle cx="720" cy="45" r="3" fill="white" fill-opacity="0.8"/>
  <circle cx="540" cy="155" r="3" fill="white" fill-opacity="0.8"/>
  <circle cx="720" cy="155" r="3" fill="white" fill-opacity="0.8"/>
  
  <!-- Dimension label -->
  <rect x="540" y="163" width="72" height="22" rx="6" fill="white" fill-opacity="0.08"/>
  <text x="576" y="178" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="white" fill-opacity="0.5" text-anchor="middle">180 x 110</text>
  
  <!-- Title -->
  <text x="60" y="95" font-family="Segoe UI, system-ui, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-1">Yoink</text>
  
  <!-- Subtitle -->
  <text x="62" y="125" font-family="Segoe UI, system-ui, sans-serif" font-size="16" fill="white" fill-opacity="0.45">Screenshot tool for Windows</text>
  
  <!-- Tags -->
  <rect x="60" y="142" width="62" height="22" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="91" y="157" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="white" fill-opacity="0.4" text-anchor="middle">capture</text>
  
  <rect x="130" y="142" width="68" height="22" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="164" y="157" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="white" fill-opacity="0.4" text-anchor="middle">annotate</text>
  
  <rect x="206" y="142" width="44" height="22" rx="6" fill="white" fill-opacity="0.06"/>
  <text x="228" y="157" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="white" fill-opacity="0.4" text-anchor="middle">OCR</text>
</svg>
