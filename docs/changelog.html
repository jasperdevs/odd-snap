  <div class="page">
    <h1>Changelog</h1>
    <p class="subtitle">Release notes pulled live from GitHub.</p>
    <div id="changelog"><div class="loading">Loading changelog...</div></div>
  </div>

  <footer>
    <p>Yoink is open source under the GPL-3.0 license.</p>
  </footer>

  <script>
    const REPO = 'jasperdevs/yoink';

    function formatDate(str) {
      return new Date(str).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function markdownToHtml(md) {
      if (!md) return '';
      return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, m => '<ul>' + m + '</ul>')
        .replace(/\n\n/g, '<br>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
    }

    async function loadChangelog() {
      const res = await fetch(`https://api.github.com/repos/${REPO}/releases?per_page=30`);
      const releases = await res.json();
      const container = document.getElementById('changelog');

      if (!releases.length) {
        container.innerHTML = '<p class="loading">No releases found.</p>';
        return;
      }

      container.innerHTML = releases.map(r => `
        <div class="changelog-entry">
          <h2>${r.tag_name}</h2>
          <div class="date">${formatDate(r.published_at)}</div>
          <div class="body">${markdownToHtml(r.body)}</div>
        </div>
      `).join('');
    }

    loadChangelog();
  </script>
</body>
