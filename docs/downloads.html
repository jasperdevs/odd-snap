<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads - Yoink</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav><div class="inner">
    <div class="left">
      <a href="./" class="logo"><img src="favicon.ico" alt="">Yoink</a>
      <div class="links">
        <a href="./">Home</a>
        <a href="downloads.html" class="active">Downloads</a>
        <a href="changelog.html">Changelog</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="right">
      <a href="https://github.com/jasperdevs/yoink" target="_blank" class="star-badge" id="starBadge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="starCount"></span>
      </a>
    </div>
  </div></nav>

  <div class="page">
    <h1>Downloads</h1>
    <p class="subtitle">Windows executables and source code from GitHub releases.</p>
    <div id="releases"><div class="loading">Loading releases...</div></div>
  </div>

  <footer>
    <p>Yoink is open source under the GPL-3.0 license.</p>
  </footer>

  <script>
    fetch('https://api.github.com/repos/jasperdevs/yoink')
      .then(r => r.json())
      .then(d => {
        const s = d.stargazers_count;
        document.getElementById('starCount').textContent = s >= 1000 ? (s/1000).toFixed(1)+'k' : s;
      }).catch(() => {});

    const WIN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.5"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>';

    function formatSize(b) {
      if (b < 1048576) return (b/1024).toFixed(0) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }
    function formatDate(s) {
      return new Date(s).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    }

    function detectArch() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('arm') || ua.includes('aarch64')) return 'arm64';
      if (ua.includes('wow64') || ua.includes('win64') || ua.includes('x86_64') || ua.includes('x64')) return 'x64';
      return 'x64';
    }

    function assetInfo(a) {
      const n = a.name.toLowerCase();
      if (n.includes('arm64')) return { arch: 'arm64', label: 'Windows (ARM64)', ext: n.endsWith('.exe') ? 'exe' : 'zip' };
      if (n.includes('x86') && !n.includes('x64')) return { arch: 'x86', label: 'Windows (x86)', ext: n.endsWith('.exe') ? 'exe' : 'zip' };
      if (n.includes('x64')) return { arch: 'x64', label: 'Windows (x64)', ext: n.endsWith('.exe') ? 'exe' : 'zip' };
      return { arch: '', label: a.name, ext: '' };
    }

    async function loadReleases() {
      const res = await fetch('https://api.github.com/repos/jasperdevs/yoink/releases?per_page=20');
      const releases = await res.json();
      const c = document.getElementById('releases');
      if (!releases.length) { c.innerHTML = '<p class="loading">No releases found.</p>'; return; }

      const myArch = detectArch();

      c.innerHTML = releases.map((r, i) => {
        const exes = r.assets.filter(a => a.name.endsWith('.exe'));
        const zips = r.assets.filter(a => a.name.endsWith('.zip'));
        const moreId = 'more-' + i;

        // Main rows: exe downloads
        const mainRows = exes.map(a => {
          const info = assetInfo(a);
          const rec = info.arch === myArch;
          return `<div class="dl-row">
            <span class="dl-label">${WIN} ${info.label}${rec ? '<span class="rec">Recommended</span>' : ''} <span class="size">${formatSize(a.size)}</span></span>
            <a href="${a.browser_download_url}" class="dl-btn">Download</a>
          </div>`;
        }).join('');

        // Extra rows: zips + source
        const extraRows = zips.map(a => {
          const info = assetInfo(a);
          return `<div class="dl-row">
            <span class="dl-label">${WIN} ${info.label} (.zip) <span class="size">${formatSize(a.size)}</span></span>
            <a href="${a.browser_download_url}" class="dl-btn">Download</a>
          </div>`;
        }).join('') + `<div class="dl-row">
          <span class="dl-label">Source code (.zip)</span>
          <a href="${r.zipball_url}" class="dl-btn">Download</a>
        </div>`;

        return `<div class="release-card">
          <div class="header">
            <div><span class="tag">${r.tag_name}</span>${i === 0 ? '<span class="badge">Latest</span>' : ''}</div>
            <span class="date">${formatDate(r.published_at)}</span>
          </div>
          ${mainRows}
          <div id="${moreId}" style="display:none">${extraRows}</div>
          <button class="show-more-btn" onclick="var e=document.getElementById('${moreId}');if(e.style.display==='none'){e.style.display='block';this.textContent='Show less'}else{e.style.display='none';this.textContent='Show more'}">Show more</button>
        </div>`;
      }).join('');
    }
    loadReleases();
  </script>
</body>
</html>
